<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number</title>
    <style>
        :root {
            --bg-color-start: #87CEEB; /* Sky Blue */
            --bg-color-end: #00BFFF;   /* Deep Sky Blue */
            --text-color: #ffffff;
            --btn-color: #ffffff;
            --btn-text: #007acc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, var(--bg-color-start), var(--bg-color-end));
            overflow: hidden; /* Keep floating numbers inside */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            position: relative;
        }

        /* --- Animated Background Numbers --- */
        .bg-number {
            position: absolute;
            color: rgba(255, 255, 255, 0.2);
            font-size: 4rem;
            font-weight: bold;
            pointer-events: none; /* Let clicks pass through */
            user-select: none;
            animation: drift linear infinite;
        }

        @keyframes drift {
            0% {
                transform: translateY(110vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* --- Main Game Container (No White Card) --- */
        main {
            text-align: center;
            z-index: 10;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        p.subtitle {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.95;
        }

        /* Input Area */
        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        input[type="number"] {
            width: 150px;
            padding: 15px;
            font-size: 2rem;
            text-align: center;
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            outline: none;
            transition: transform 0.2s;
        }

        input[type="number"]:focus {
            transform: scale(1.05);
        }

        /* Hide spin buttons on input */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--btn-text);
            background-color: var(--btn-color);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Feedback Area */
        .feedback-area {
            margin-top: 2rem;
            min-height: 80px;
        }

        .message {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .attempts {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* --- Modal / Pop-up --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: white;
            color: #333;
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
            width: 400px;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
        }

        .modal-title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #007acc;
        }

        .modal-text {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: #666;
        }

        .modal-btn {
            background-color: #007acc;
            color: white;
        }
        
        /* Responsive Tweaks */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .bg-number { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <!-- Background Animation Container -->
    <div id="background-container"></div>

    <main>
        <h1>Guess the Number</h1>
        <p class="subtitle">Pick a number between 1 and 100 — you have 6 attempts.</p>

        <div class="input-group">
            <input type="number" id="guessInput" placeholder="#" min="1" max="100">
            <button id="submitBtn">Guess!</button>
        </div>

        <div class="feedback-area">
            <div class="message" id="message"></div>
            <div class="attempts">Attempts remaining: <span id="attemptCount">6</span></div>
        </div>
    </main>

    <!-- Modal Structure -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <span class="modal-emoji" id="modalEmoji">🎉🏆</span>
            <h2 class="modal-title" id="modalTitle">You Won!</h2>
            <p class="modal-text" id="modalText">Great job guessing the number.</p>
            <button class="modal-btn" id="modalBtn">Play Again</button>
        </div>
    </div>

    <script>
        // --- Game Configuration & State ---
        const MAX_ATTEMPTS = 6;
        let targetNumber;
        let attemptsRemaining;
        let isGameActive;

        // --- DOM Elements ---
        const guessInput = document.getElementById('guessInput');
        const submitBtn = document.getElementById('submitBtn');
        const messageEl = document.getElementById('message');
        const attemptCountEl = document.getElementById('attemptCount');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalEmoji = document.getElementById('modalEmoji');
        const modalTitle = document.getElementById('modalTitle');
        const modalText = document.getElementById('modalText');
        const modalBtn = document.getElementById('modalBtn');
        const bgContainer = document.getElementById('background-container');

        // --- Initialization ---
        function initGame() {
            targetNumber = Math.floor(Math.random() * 100) + 1;
            attemptsRemaining = MAX_ATTEMPTS;
            isGameActive = true;

            // Reset UI
            messageEl.textContent = '';
            messageEl.style.color = 'white';
            attemptCountEl.textContent = attemptsRemaining;
            guessInput.value = '';
            guessInput.disabled = false;
            submitBtn.disabled = false;
            guessInput.focus();
            closeModal();

            console.log("Cheater hint: Target is " + targetNumber); // For debugging
        }

        // --- Background Animation Logic ---
        function createFloatingNumbers() {
            const count = 6; // As requested: 5-6 boxes
            const numbers = ['1', '2', '5', '8', '0', '7']; // Some playful numbers
            
            numbers.forEach((num, i) => {
                const el = document.createElement('div');
                el.classList.add('bg-number');
                el.textContent = num;
                
                // Randomize positioning and animation properties
                const left = Math.random() * 90; // 0% to 90% width
                const duration = 10 + Math.random() * 10; // 10s to 20s duration
                const delay = Math.random() * 5; // 0s to 5s start delay
                
                el.style.left = `${left}%`;
                el.style.animationDuration = `${duration}s`;
                el.style.animationDelay = `-${delay}s`; // Negative delay to start mid-animation immediately
                
                bgContainer.appendChild(el);
            });
        }

        // --- Core Game Logic ---
        function handleGuess() {
            if (!isGameActive) return;

            const userGuess = parseInt(guessInput.value);

            // Validation
            if (isNaN(userGuess) || userGuess < 1 || userGuess > 100) {
                messageEl.textContent = '⚠️ Please enter a number between 1 and 100';
                return;
            }

            attemptsRemaining--;
            attemptCountEl.textContent = attemptsRemaining;

            if (userGuess === targetNumber) {
                handleWin();
            } else if (attemptsRemaining === 0) {
                handleLoss();
            } else {
                // Wrong guess feedback
                if (userGuess > targetNumber) {
                    messageEl.textContent = '📉 Too Low! (Wait, that means your number was High... 📈 Too High!)';
                    messageEl.textContent = '📈 Too High!';
                } else {
                    messageEl.textContent = '📉 Too Low!';
                }
                guessInput.value = '';
                guessInput.focus();
            }
        }

        function handleWin() {
            isGameActive = false;
            guessInput.disabled = true;
            submitBtn.disabled = true;
            
            // Configure Modal
            modalEmoji.textContent = '🎉🏆';
            modalTitle.textContent = 'You Won!';
            modalText.textContent = `Awesome! You guessed the number ${targetNumber} correctly.`;
            modalBtn.textContent = 'Play Again';
            
            showModal();
        }

        function handleLoss() {
            isGameActive = false;
            guessInput.disabled = true;
            submitBtn.disabled = true;
            
            // Configure Modal
            modalEmoji.textContent = '😢';
            modalTitle.textContent = 'Game Over';
            modalText.textContent = `You ran out of attempts. The number was ${targetNumber}.`;
            modalBtn.textContent = 'Try Again';
            
            showModal();
        }

        // --- Modal Controls ---
        function showModal() {
            modalOverlay.classList.add('active');
            modalBtn.focus();
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        // --- Event Listeners ---
        submitBtn.addEventListener('click', handleGuess);

        guessInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleGuess();
        });

        modalBtn.addEventListener('click', initGame);

        // --- Start Everything ---
        createFloatingNumbers();
        initGame();

    </script>
</body>
</html>
